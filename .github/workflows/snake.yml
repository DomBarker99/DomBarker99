name: snake

on:
  # Run on every push so a nightly cron isn't the only trigger.
  push:
    branches: [main]
  # Every day at 07:00 UTC (~midnight PST).
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: generate snake animation
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/snake.svg?color_snake=#5fff9f&color_dots=#0a120c,#1f3322,#2f5a3a,#5fff9f,#bfffd4
            dist/snake-dark.svg?palette=github-dark&color_snake=#5fff9f&color_dots=#0a120c,#1f3322,#2f5a3a,#5fff9f,#bfffd4

      - name: push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
