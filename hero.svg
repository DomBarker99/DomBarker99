    </rect>
  </clipPath>
  <g transform="translate(32,98)" clip-path="url(#asciiclip)">
    <text class="term ascii" filter="url(#glow)">
      <tspan x="0" dy="16">  ____   ___  __  __ ___ _   _ ___ ____        ____    _    ____  _  _______ ____ </tspan>
      <tspan x="0" dy="16"> |  _ \ / _ \|  \/  |_ _| \ | |_ _/ ___|      | __ )  / \  |  _ \| |/ / ____|  _ \</tspan>
      <tspan x="0" dy="16"> | | | | | | | |\/| || ||  \| || | |          |  _ \ / _ \ | |_) | &#39; /|  _| | |_) |</tspan>
      <tspan x="0" dy="16"> | |_| | |_| | |  | || || |\  || | |___       | |_) / ___ \|  _ &lt;| . \| |___|  _ &lt;</tspan>
      <tspan x="0" dy="16"> |____/ \___/|_|  |_|___|_| \_|___\____|      |____/_/   \_\_| \_\_|\_\_____|_| \_\</tspan>
    </text>
  </g>

  
  <g transform="translate(32,232)" opacity="0">
    
    <text class="term dim">// software engineer · sjsu &#39;27 · homelab operator · teaches what he learns</text>
  </g>

  
  <g transform="translate(32,256)" opacity="0">
    
    <g>
      <rect width="92" height="20" rx="3" class="pill"></rect>
      <text x="46" y="14" class="term tag" text-anchor="middle">● ONLINE</text>
    </g>
    <g transform="translate(102,0)">
