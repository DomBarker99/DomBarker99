    <text class="term prompt">dominic@iota</text>
    <text class="term dim" x="100">:</text>
    <text class="term sub" x="108">~</text>
    <text class="term prompt" x="124">$</text>
    <g clip-path="url(#typeclip)">
      <text class="term sub" x="140">cat /etc/whoami.txt</text>
    </g>
    
    <rect x="140" y="-12" width="8" height="16" class="cursor">
      
      
    </rect>
  </g>

  
  <clipPath id="asciiclip">
