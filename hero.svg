<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 320" width="900" height="320" role="img" aria-label="Dominic Barker terminal banner">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0a0f0a"></stop>
      <stop offset="1" stop-color="#060a06"></stop>
    </linearGradient>
    <linearGradient id="scan" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5fff9f" stop-opacity="0"></stop>
      <stop offset="0.5" stop-color="#5fff9f" stop-opacity="0.08"></stop>
      <stop offset="1" stop-color="#5fff9f" stop-opacity="0"></stop>
    </linearGradient>
    <filter id="glow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="0.6" result="b"></feGaussianBlur>
      <feMerge><feMergeNode in="b"></feMergeNode><feMergeNode in="SourceGraphic"></feMergeNode></feMerge>
    </filter>
    
  </defs>

  
  <rect x="0" y="0" width="900" height="320" fill="url(#bg)"></rect>
  <rect x="12" y="12" width="876" height="296" rx="8" class="border"></rect>
  <rect x="12" y="12" width="876" height="28" rx="8" class="chrome"></rect>
  <rect x="12" y="30" width="876" height="10" class="chrome"></rect>
  <circle cx="30" cy="26" r="5.5" class="tl-r"></circle>
  <circle cx="48" cy="26" r="5.5" class="tl-y"></circle>
  <circle cx="66" cy="26" r="5.5" class="tl-g"></circle>
  <text x="450" y="30" class="term dim" text-anchor="middle">dominic@iota  —  zsh  —  92×24</text>

  
  <rect x="12" y="40" width="876" height="24" fill="url(#scan)">
    
  </rect>

  
  <g transform="translate(32,68)">
    <text class="term prompt">dominic@iota</text>
    <text class="term dim" x="100">:</text>
    <text class="term sub" x="108">~</text>
    <text class="term prompt" x="124">$</text>
    <text class="term sub" x="140">
      <tspan opacity="0">cat /etc/whoami.txt</tspan>
      <tspan opacity="1">
        
        c
      </tspan>
    </text>
    
  </g>

  
