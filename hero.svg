      <text x="67" y="14" class="term" text-anchor="middle" fill="#5fff9f" font-size="12" font-weight="700">GPA 3.925</text>
    </g>
    <g transform="translate(246,0)">
      <rect width="180" height="20" rx="3" class="pill-amber"></rect>
